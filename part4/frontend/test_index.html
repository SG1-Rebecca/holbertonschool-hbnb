<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/icon.png">
</head>
<body>
<header>
    <img src="images/logo.png" alt="logo" class="logo">
    <nav>
        <a href="login.html" id="login-link">Login</a>
    </nav>
</header>
<main>
    <h1>Available Places</h1>
    <section id="filter">
        <label for="price-filter">Max Price:</label>
        <select id="price-filter">
            <!-- Options will be populated dynamically -->
        </select>
    </section>
    <section id="places-list">
        <!-- List of places will be populated dynamically -->
    </section>
</main>
<footer>
    <p>&copy; 2026 HBnB. All rights reserved</p>
</footer>
<script>
    // ============================================
// MOCK API pour les tests (simule le backend)
// ============================================
const MOCK_API = {
    // Stockage du token simulé
    _token: null,
    
    // Configuration des places mock
    places: [
        { id: 1, name: 'Cozy Cottage', price: 50, description: 'A cozy cottage in the woods', location: 'Forest' },
        { id: 2, name: 'Modern Apartment', price: 100, description: 'Modern apartment downtown', location: 'City Center' },
        { id: 3, name: 'Beach House', price: 150, description: 'Beautiful beach house', location: 'Coast' },
        { id: 4, name: 'Budget Studio', price: 10, description: 'Small budget studio', location: 'Suburbs' },
        { id: 5, name: 'Luxury Villa', price: 200, description: 'Luxury villa with pool', location: 'Hills' }
    ],
    
    // Endpoint login simulé
    async login(email, password) {
        if (email === 'test@example.com' && password === 'password123') {
            this._token = 'mock-jwt-token-12345';
            return { ok: true, data: { access_token: this._token } };
        }
        return { ok: false, data: { message: 'Invalid credentials' } };
    },
    
    // Endpoint places simulé
    async getPlaces(token) {
        if (token === this._token) {
            return { ok: true, data: { places: this.places } };
        }
        return { ok: false, statusText: 'Unauthorized' };
    },
    
    // Helper pour réinitialiser
    reset() {
        this._token = null;
    }
};

// ============================================
// CODE À TESTER (scripts.js)
// ============================================

// Simulation du cookie pour les tests
function setCookie(name, value) {
    document.cookie = `${name}=${value}; path=/`;
}

function deleteCookie(name) {
    document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
}

function getCookie(name) {
    const cookies = document.cookie.split(';');
    for (const cookie of cookies) {
        const [key, value] = cookie.trim().split('=');
        if (key === name) {
            return value;
        }
    }
    return null;
}

// Mock de fetch pour les tests
const originalFetch = window.fetch;
window.fetch = async (url, options = {}) => {
    if (url === '/api/v1/auth/login') {
        const body = JSON.parse(options.body || '{}');
        const result = await MOCK_API.login(body.email, body.password);
        if (result.ok) {
            return {
                ok: true,
                json: async () => ({ access_token: result.data.access_token })
            };
        } else {
            return {
                ok: false,
                statusText: 'Unauthorized',
                json: async () => ({ message: result.data.message })
            };
        }
    }
    
    if (url === '/api/v1/places') {
        const token = options.headers?.Authorization?.replace('Bearer ', '');
        const result = await MOCK_API.getPlaces(token);
        if (result.ok) {
            return {
                ok: true,
                json: async () => result.data
            };
        } else {
            return {
                ok: false,
                statusText: result.statusText || 'Unauthorized',
                json: async () => ({})
            };
        }
    }
    
    return originalFetch(url, options);
};

// Fonctions du code original
function checkAuthentication() {
    const token = getCookie('token');
    const loginLink = document.getElementById('login-link');
    
    console.log('[Test] checkAuthentication - Token:', token ? 'present' : 'absent');
    
    if (!token) {
        loginLink.style.display = 'block';
        console.log('[Test] Login link should be visible');
    } else {
        loginLink.style.display = 'none';
        console.log('[Test] Login link should be hidden');
        fetchPlaces(token);
    }
}

async function fetchPlaces(token) {
    console.log('[Test] fetchPlaces called with token:', token ? 'present' : 'absent');
    const url = '/api/v1/places';
    
    try {
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                Authorization: `Bearer ${token}`
            }
        });
        
        if (response.ok) {
            const data = await response.json();
            console.log('[Test] Places fetched successfully:', data.places.length, 'places');
            displayPlaces(data.places);
        } else {
            console.error('[Test] Failed to fetch places:', response.statusText);
        }
    } catch (error) {
        console.error('[Test] Error fetching places:', error);
    }
}

function populatePriceFilter() {
    const priceFilter = document.getElementById('price-filter');
    const options = [
        { value: 'all', label: 'All' },
        { value: '10', label: '10' },
        { value: '50', label: '50' },
        { value: '100', label: '100' }
    ];
    
    priceFilter.innerHTML = '';
    options.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        priceFilter.appendChild(option);
    });
    console.log('[Test] Price filter populated with options');
}

const mockPlaces = [
    { id: 1, name: 'Cozy Cottage', price: 50 },
    { id: 2, name: 'Modern Apartment', price: 100 },
    { id: 3, name: 'Beach House', price: 150 }
];

function displayPlaces(places) {
    const placesList = document.getElementById('places-list');
    placesList.innerHTML = '';
    
    places.forEach(place => {
        const placeItem = document.createElement('div');
        placeItem.className = 'place-item';
        placeItem.setAttribute('data-price', place.price);
        placeItem.innerHTML = `
            <h3>${place.name}</h3>
            <p>Price per night: $${place.price}</p>
            <button onclick="window.location.href='place.html?id=${place.id}'">View Details</button>
        `;
        placesList.appendChild(placeItem);
    });
    console.log('[Test] Displayed', places.length, 'places');
}

// Tests unitaires
const tests = {
    passed: 0,
    failed: 0,
    results: [],
    
    assert(condition, message) {
        if (condition) {
            this.passed++;
            this.results.push({ status: 'PASS', message });
            console.log('✅ PASS:', message);
        } else {
            this.failed++;
            this.results.push({ status: 'FAIL', message });
            console.error('❌ FAIL:', message);
        }
    },
    
    display() {
        const output = document.getElementById('test-output');
        output.innerHTML = `
            <div>Total: ${this.passed + this.failed} | 
                 <span class="test-pass">Passed: ${this.passed}</span> | 
                 <span class="test-fail">Failed: ${this.failed}</span>
            </div>
            <ul>
                ${this.results.map(r => `<li class="test-${r.status.toLowerCase()}">[${r.status}] ${r.message}</li>`).join('')}
            </ul>
        `;
    }
};

async function runTests() {
    console.log('========================================');
    console.log('STARTING TESTS');
    console.log('========================================');
    
    // Nettoyage avant tests
    deleteCookie('token');
    MOCK_API.reset();
    
    // Test 1: Vérification que populatePriceFilter fonctionne
    populatePriceFilter();
    const priceFilter = document.getElementById('price-filter');
    tests.assert(priceFilter.children.length === 4, 'Price filter has 4 options');
    tests.assert(priceFilter.children[0].value === 'all' && priceFilter.children[0].label === 'All', 'First option is "All"');
    tests.assert(priceFilter.children[1].value === '10', 'Second option is "10"');
    tests.assert(priceFilter.children[2].value === '50', 'Third option is "50"');
    tests.assert(priceFilter.children[3].value === '100', 'Fourth option is "100"');
    
    // Test 2: Vérification displayPlaces avec mock
    displayPlaces(mockPlaces);
    const placesList = document.getElementById('places-list');
    tests.assert(placesList.children.length === 3, 'Displayed 3 mock places');
    tests.assert(placesList.children[0].getAttribute('data-price') === '50', 'First place price is 50');
    tests.assert(placesList.children[1].getAttribute('data-price') === '100', 'Second place price is 100');
    tests.assert(placesList.children[2].getAttribute('data-price') === '150', 'Third place price is 150');
    
    // Test 3: Vérification getCookie/setCookie
    setCookie('token', 'test-token-123');
    const token = getCookie('token');
    tests.assert(token === 'test-token-123', 'Cookie set and retrieved correctly');
    deleteCookie('token');
    const noToken = getCookie('token');
    tests.assert(noToken === null, 'Cookie deleted correctly');
    
    // Test 4: Vérification authentification sans token
    const loginLink = document.getElementById('login-link');
    checkAuthentication();
    tests.assert(loginLink.style.display === 'block', 'Login link visible when no token');
    
    // Test 5: Vérification authentification avec token valide
    setCookie('token', 'mock-jwt-token-12345');
    // Simuler que le token est valide
    MOCK_API._token = 'mock-jwt-token-12345';
    await checkAuthentication();
    await new Promise(resolve => setTimeout(resolve, 100)); // Attendre fetch
    tests.assert(loginLink.style.display === 'none', 'Login link hidden when token present');
    tests.assert(document.getElementById('places-list').children.length === 5, 'Fetched and displayed 5 real places from API');
    
    // Test 6: Vérification filtre prix
    const filterEvent = new Event('change');
    priceFilter.value = '50';
    priceFilter.dispatchEvent(filterEvent);
    
    const visibleItems = Array.from(document.querySelectorAll('.place-item')).filter(
        item => item.style.display !== 'none'
    );
    tests.assert(visibleItems.length === 2, 'Filter with 50 shows 2 places (prices ≤ 50)');
    
    // Vérifier les prix des places visibles
    const visiblePrices = visibleItems.map(item => parseInt(item.getAttribute('data-price')));
    const allValid = visiblePrices.every(price => price <= 50);
    tests.assert(allValid, 'All visible places have price ≤ 50');
    
    // Test 7: Vérification filtre "All"
    priceFilter.value = 'all';
    priceFilter.dispatchEvent(filterEvent);
    const allVisible = Array.from(document.querySelectorAll('.place-item')).filter(
        item => item.style.display !== 'none'
    );
    tests.assert(allVisible.length === 5, 'Filter "All" shows all 5 places');
    
    // Test 8: Vérification filtre avec prix 100
    priceFilter.value = '100';
    priceFilter.dispatchEvent(filterEvent);
    const visible100 = Array.from(document.querySelectorAll('.place-item')).filter(
        item => item.style.display !== 'none'
    );
    tests.assert(visible100.length === 4, 'Filter with 100 shows 4 places (prices ≤ 100)');
    
    // Test 9: Vérification filtre avec prix 10
    priceFilter.value = '10';
    priceFilter.dispatchEvent(filterEvent);
    const visible10 = Array.from(document.querySelectorAll('.place-item')).filter(
        item => item.style.display !== 'none'
    );
    tests.assert(visible10.length === 1, 'Filter with 10 shows 1 place (price ≤ 10)');
    tests.assert(visible10[0]?.getAttribute('data-price') === '10', 'The visible place has price 10');
    
    // Nettoyage final
    deleteCookie('token');
    
    console.log('========================================');
    console.log('TESTS COMPLETED');
    console.log(`Results: ${tests.passed} passed, ${tests.failed} failed`);
    console.log('========================================');
    
    tests.display();
}

// Lancer les tests au chargement
document.addEventListener('DOMContentLoaded', () => {
    console.log('DOM loaded, starting tests...');
    runTests();
});

// Écouteur original pour le filtre (à garder pour les tests)
document.getElementById('price-filter').addEventListener('change', (event) => {
    const selectedPrice = event.target.value;
    const placeItems = document.querySelectorAll('.place-item');
    placeItems.forEach(item => {
        const price = item.getAttribute('data-price');
        if (selectedPrice === 'all') {
            item.style.display = 'block';
        } else {
            const maxPrice = parseInt(selectedPrice);
            if (price <= maxPrice) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        }
    });
});
</script>
</body>
</html>
